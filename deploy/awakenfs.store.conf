# Awaken Store — awakenfs.store  (lite stack: backend-lite + Next.js storefront)
#
# Single domain, path-routed to the Dockerized lite stack on localhost:
#   /store /auth /admin /app /key-exchange /health -> backend-lite (9010)
#   /api/webhooks/...                               -> backend-lite (9010)  (RinggitPay server callback)
#   /  (pages, /_next, /api/healthcheck, /api/ringgitpay*) -> storefront (8010)
#
# backend-lite's routes are NOT path-prefixed, but the storefront's pages all live
# under /<countryCode>/... (e.g. /us/store), so the bare /store /auth /admin /app
# /health /key-exchange paths are free to hand to the backend. Within /api the two
# never overlap: backend owns /api/webhooks, storefront owns /api/healthcheck and
# /api/ringgitpay*.
#
# Ports 8010/9010 are used (8000/9000 belong to the everbright stack + the local
# dev backend). They are published to 127.0.0.1 only by docker-compose.lite.prod.yml.
#
# Deploy on the host:
#   ln -s /etc/nginx/sites-available/awakenfs.store.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d awakenfs.store -d www.awakenfs.store   # adds the 443 block + 80->443 redirect

# Unique-named upgrade map (avoids collision with other sites' $connection_upgrade).
map $http_upgrade $awaken_connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name awakenfs.store www.awakenfs.store;

    # Admin product-image uploads etc.
    client_max_body_size 50m;

    # ---- Common proxy headers ----
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $awaken_connection_upgrade;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 15s;

    # ---- backend-lite: server-to-server webhook (must beat the storefront default) ----
    location /api/webhooks/ { proxy_pass http://127.0.0.1:9010; }

    # ---- backend-lite: API + admin (bare, non-prefixed routes) ----
    location /store        { proxy_pass http://127.0.0.1:9010; }
    location /auth         { proxy_pass http://127.0.0.1:9010; }
    location /admin        { proxy_pass http://127.0.0.1:9010; }
    location /app          { proxy_pass http://127.0.0.1:9010; }
    location /key-exchange { proxy_pass http://127.0.0.1:9010; }
    location /health       { proxy_pass http://127.0.0.1:9010; }

    # ---- product media (mirrored off Railway MinIO into /srv/awakenfs-media;
    #      served same-origin so next/image trusts it without extra remotePatterns) ----
    location /media/ {
        alias /srv/awakenfs-media/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ---- storefront: everything else (pages, /_next, /api/healthcheck, /api/ringgitpay*) ----
    location / { proxy_pass http://127.0.0.1:8010; }
}
